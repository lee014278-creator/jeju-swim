<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>제주 공공수영장 지도</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#f5f5f5;color:#111;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.map-wrap{flex-shrink:0;width:100%;aspect-ratio:1517/1037;background:#d7edf8;overflow:hidden;}
#mapSvg{width:100%;height:100%;display:block;}
.filter-bar{flex-shrink:0;background:white;padding:10px 12px;border-bottom:1px solid #eee;}
.tab-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;}
.tab-row::-webkit-scrollbar{display:none;}
.tab-btn{padding:6px 14px;border-radius:20px;border:none;cursor:pointer;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;background:#f0f0f0;color:#666;transition:all .15s;}
.tab-btn[data-area="전체"].active{background:#555;color:white;}
.tab-btn[data-area="제주시"].active{background:#1a6db5;color:white;}
.tab-btn[data-area="서귀포"].active{background:#dd6b20;color:white;}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.result-count{padding:8px 12px;font-size:12px;color:#888;}
.card-list{padding:0 12px 24px;display:flex;flex-direction:column;gap:8px;}
.card{background:white;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.08);border:1.5px solid transparent;transition:all .2s;}
.card.open{box-shadow:0 4px 16px rgba(0,0,0,0.12);}
.card-header{display:flex;align-items:center;padding:12px 14px;cursor:pointer;gap:10px;}
.card-num{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:14px;font-weight:900;flex-shrink:0;}
.card-info{flex:1;}
.card-name{font-size:18px;font-weight:700;color:#1a1a1a;}
.card-sub{font-size:12px;color:#888;margin-top:3px;}
.card-arrow{font-size:16px;color:#bbb;transition:transform .2s;}
.card.open .card-arrow{transform:rotate(180deg);}
.card-body{display:none;padding:0 14px 14px;gap:8px;flex-direction:column;}
.card.open .card-body{display:flex;}
.card-btn{display:block;text-align:center;padding:14px;border-radius:10px;font-weight:700;font-size:17px;text-decoration:none;font-family:'Noto Sans KR',sans-serif;}
.card-btn.naver{background:#03c75a;color:white;}
.card-btn.home{background:#4a90e2;color:white;}
</style>
</head>

://samyangbandabi.kr/"}, {"id": "s10", "num": 10, "name": "애월복합문화체육센터", "region": "제주시", "color": "#1a6db5", "x": 544, "y": 367, "naver": "https://map.naver.com/p/search/애월복합문화체육센터%20제주시%20애월읍%20애원로%2039", "home": null}, {"id": "s11", "num": 11, "name": "서귀포 국민체육센터", "region": "서귀포", "color": "#dd6b20", "x": 538, "y": 784, "naver": "https://map.naver.com/p/search/서귀포%20국민체육센터%20서귀포시%20중문관광로%20346", "home": "https://psf.kr/sports/bview/43"}, {"id": "s12", "num": 12, "name": "제주혁신도시 복합혁신센터", "region": "서귀포", "color": "#dd6b20", "x": 746, "y": 630, "naver": "https://map.naver.com/p/search/제주혁신도시복합혁신센터%20수영장%20서귀포시%20서호남로%2025", "home": null}, {"id": "s13", "num": 13, "name": "서귀포시민문화체육복합센터", "region": "서귀포", "color": "#dd6b20", "x": 833, "y": 760, "naver": "https://map.naver.com/p/search/서귀포시민문화체육복합센터%20서귀포시%20동홍로%2030", "home": null}, {"id": "s14", "num": 14, "name": "남원읍문화체육복합센터", "region": "서귀포", "color": "#dd6b20", "x": 1103, "y": 669, "naver": "https://map.naver.com/p/search/남원읍문화체육복합센터%20수영장%20서귀포시%20남원읍%20태위로%20551-28", "home": "https://ist2017nw.co.kr/"}, {"id": "s15", "num": 15, "name": "표선면문화체육복합센터", "region": "서귀포", "color": "#dd6b20", "x": 1329, "y": 610, "naver": "https://map.naver.com/p/search/표선면문화체육복합센터%20서귀포시%20민속해안로%20631-12", "home": null}, {"id": "s16", "num": 16, "name": "안덕면문화체육복합센터", "region": "서귀포", "color": "#dd6b20", "x": 315, "y": 698, "naver": "https://map.naver.com/p/search/안덕면문화체육복합센터%20수영장%20서귀포시%20안덕면%20화순서서로%2089", "home": null}];
const regions = {
  전체:{x:0,y:0,w:1517,h:1037},
  제주시:{x:0,y:0,w:1400,h:580},
  서귀포:{x:100,y:490,w:1350,h:550}
};
let curArea='전체', openId=null;

function esc(v){return String(v).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function isVisible(s){return curArea==='전체'||s.region===curArea;}
function setView(area){
  const r=regions[area]||regions['전체'];
  document.getElementById('mapSvg').setAttribute('viewBox',`${r.x} ${r.y} ${r.w} ${r.h}`);
}

function renderMarkers(){
  const layer=document.getElementById('markerLayer');
  const sorted=[...spots].sort((a,b)=>{
    if(String(a.id)===String(openId)) return 1;
    if(String(b.id)===String(openId)) return -1;
    return 0;
  });
  const r=36, fs=28;
  layer.innerHTML=sorted.map(s=>{
    const visible=isVisible(s);
    const opacity=visible?1:0.2;
    return `<g class="mk" data-id="${s.id}" style="cursor:pointer;" pointer-events="all">
      <circle cx="${s.x}" cy="${s.y}" r="${r}" fill="transparent" stroke="transparent"/>
      <rect x="${s.x-50}" y="${s.y-50}" width="100" height="100" fill="transparent" style="cursor:pointer;"/>
    <\/g>`;
  }).join('');
  layer.onclick=function(e){
    const g=e.target.closest('.mk');
    if(!g) return;
    const s=spots.find(x=>String(x.id)===String(g.dataset.id));
    if(!s) return;
    curArea=s.region;
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.area===curArea));
    openId=s.id;
    setView(curArea);
    renderMarkers();
    renderCards();
  };
}

function renderCards(){
  let filtered=spots.filter(isVisible);
  if(openId){
    const idx=filtered.findIndex(s=>String(s.id)===String(openId));
    if(idx>0){const [item]=filtered.splice(idx,1);filtered.unshift(item);}
  }
  document.getElementById('resultCount').innerHTML=`총 <strong style="color:#1a6db5">${filtered.length}곳</strong>`;
  const list=document.getElementById('cardList');
  list.innerHTML=filtered.map(s=>{
    const isOpen=String(openId)===String(s.id);
    const homeBtn=s.home?`<a href="${s.home}" target="_blank" class="card-btn home">🌐 공식 안내<\/a>`:'';
    return `<div class="card${isOpen?' open':''}" data-id="${s.id}" style="border-color:${isOpen?s.color:'transparent'}">
      <div class="card-header">
        <div class="card-num" style="background:${s.color}">${s.num}<\/div>
        <div class="card-info">
          <div class="card-name">${esc(s.name)}<\/div>
          <div class="card-sub">${s.region}권<\/div>
        <\/div>
        <div class="card-arrow">▼<\/div>
      <\/div>
      <div class="card-body">
        <a href="${s.naver}" target="_blank" class="card-btn naver">📍 네이버 지도<\/a>
        ${homeBtn}
      <\/div>
    <\/div>`;
  }).join('');
  list.querySelectorAll('.card').forEach(card=>{
    card.querySelector('.card-header').addEventListener('click',()=>{
      const id=card.dataset.id;
      openId=String(openId)===String(id)?null:id;
      renderCards();
    });
  });
  if(openId){
    const scrollArea=document.querySelector('.scroll-area');
    if(scrollArea) scrollArea.scrollTop=0;
  }
}

document.getElementById('areaTab').querySelectorAll('.tab-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    curArea=b.dataset.area;
    document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    openId=null;
    setView(curArea);
    renderMarkers();
    renderCards();
  });
});

renderMarkers();
renderCards();
</script>
